<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Moedas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
</head>
<body>
    <img class="logo" src="./assets/logo.jpg"  alt="Imagem-logo">

    <main>
        <label>
            Converter <b>de</b>
            <select>
                <option>R$ Real Brasileiro</option>
            </select>
        </label>

        <label>
            Converter <b>para</b>
            <select class="currency-select">
                <option value="dolar">US$ Dólar Americano</option>
                <option value="euro">EUR Euro</option>
                <option value="libra"> GBP £ Libra</option>
                <option value="bitcoin">₿ Bitcoin</option>
            </select>
        </label>

        <label>
            Valor
            <input class="input-currency" placeholder="R$ 10.000,00">
        </label>

        <button class="convert-button" >Converter</button>

        <section>
            <div class="currency-box">
                <img id="image-to-convert" src="./assets/brazilian-real.png" alt="Imagem-moeda-a-converter">
                <p class="currency">Real</p>
                <p class="currency-value-to-convert">R$ 0,00</p>
            </div>

            <img  class="arrow-img" src="./assets/down-arrow.png" alt="Image-Arrow-Down">

            <div class="currency-box">
                <img class="image-convert" src="./assets/dollar.png" alt="Image-moeda-a-ser-convertida">
                <p class="currency" id="currency-name">Dólar Americano</p>
                <p class="currency-value-convert">U$ 0.0</p>
            </div>

        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
